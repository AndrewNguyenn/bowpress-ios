name: BowPress

options:
  bundleIdPrefix: com.andrewnguyen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

schemes:
  BowPress:
    build:
      targets:
        BowPress: all
    run:
      config: Debug
  BowPress-LocalAPI:
    build:
      targets:
        BowPress: all
    run:
      config: Debug
      environmentVariables:
        USE_LOCAL_API: "1"
        API_BASE_URL: "http://localhost:8787"
  BowPressTests:
    build:
      targets:
        BowPress: test
        BowPressTests: test
    test:
      config: Debug
      targets:
        - BowPressTests
  BowPressUITests:
    build:
      targets:
        BowPress: all
        BowPressUITests: test
    test:
      config: Debug
      targets:
        - BowPressUITests

packages:
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.15.0"

targets:
  BowPress:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/BowPress
    resources:
      - Sources/BowPress/Resources/BowCatalog.json
      - Sources/BowPress/Resources/Assets.xcassets
      - Sources/BowPress/Subscriptions/Products.storekit
    dependencies:
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        INFOPLIST_FILE: SupportingFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/BowPress.entitlements
        STORE_KIT_CONFIGURATION_FILE_PATH: Sources/BowPress/Subscriptions/Products.storekit
        DEVELOPMENT_TEAM: DFT522PW2V
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          APS_ENVIRONMENT: development
          CODE_SIGN_STYLE: Automatic
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "BowPress AppStore"

  BowPressTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BowPressTests
    dependencies:
      - target: BowPress
      - package: swift-snapshot-testing
        product: SnapshotTesting
    info:
      path: SupportingFiles/Tests-Info.plist
      properties:
        CFBundleName: BowPressTests
        CFBundlePackageType: BNDL
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress.tests
        GENERATE_INFOPLIST_FILE: NO

  BowPressUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BowPressUITests
    dependencies:
      - target: BowPress
    info:
      path: SupportingFiles/UITests-Info.plist
      properties:
        CFBundleName: BowPressUITests
        CFBundlePackageType: BNDL
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress.uitests
        GENERATE_INFOPLIST_FILE: NO
        TEST_TARGET_NAME: BowPress
