name: BowPress

options:
  bundleIdPrefix: com.andrewnguyen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

targets:
  BowPress:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/BowPress
    resources:
      - Sources/BowPress/Resources/BowCatalog.json
      - Sources/BowPress/Resources/Assets.xcassets
    dependencies:
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: SupportingFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/BowPress.entitlements
    info:
      path: SupportingFiles/Info.plist
      properties:
        CFBundleName: BowPress
        CFBundleDisplayName: BowPress
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.516990179779-05k066j5guhgc0021jsbl9pvj8bb285m
        GIDClientID: 516990179779-05k066j5guhgc0021jsbl9pvj8bb285m.apps.googleusercontent.com

  BowPressTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BowPressTests
    dependencies:
      - target: BowPress
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress.tests
        GENERATE_INFOPLIST_FILE: "YES"
    scheme:
      testTargets:
        - BowPressTests
      gatherCoverageData: false

schemes:
  BowPress:
    build:
      targets:
        BowPress: all
        BowPressTests: [test]
    test:
      targets:
        - BowPressTests
      gatherCoverageData: false
