name: BowPress

options:
  bundleIdPrefix: com.andrewnguyen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

schemes:
  BowPress:
    build:
      targets:
        BowPress: all
    run:
      config: Debug
  BowPress-LocalAPI:
    build:
      targets:
        BowPress: all
    run:
      config: Debug
      environmentVariables:
        USE_LOCAL_API: "1"
        API_BASE_URL: "http://localhost:8787"
  # BowPress-RemoteAPI: end-to-end scheme used by scripts/e2e.sh. USE_LOCAL_API=1
  # forces the live-HTTP path (not DevMockData). API_BASE_URL is deliberately
  # unset here — the orchestrator injects it at launch time via the
  # SIMCTL_CHILD_API_BASE_URL env var (xcrun simctl forwards SIMCTL_CHILD_*
  # vars into the launched app's environment), letting a single build target
  # local/staging/production backends without rebuilding.
  BowPress-RemoteAPI:
    build:
      targets:
        BowPress: all
    run:
      config: Debug
      # Intentionally no storeKitConfiguration here. xcodebuild + simctl
      # launch does not honor scheme-attached StoreKit test configs the way
      # the Xcode IDE does (it's an IDE-only feature), and SKTestSession
      # requires XCTest — which pulls rpath dependencies an app target
      # cannot satisfy. Paywall purchase flows (.maestro/03, .maestro/06)
      # are therefore skipped by scripts/e2e.sh; manual verification in
      # Xcode IDE is the documented path. See .maestro/README.md.
      environmentVariables:
        USE_LOCAL_API: "1"
  BowPressTests:
    build:
      targets:
        BowPress: test
        BowPressTests: test
    test:
      config: Debug
      targets:
        - BowPressTests
  BowPressUITests:
    build:
      targets:
        BowPress: all
        BowPressUITests: test
    test:
      config: Debug
      targets:
        - BowPressUITests

packages:
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.15.0"

targets:
  BowPress:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/BowPress
    resources:
      - Sources/BowPress/Resources/BowCatalog.json
      - Sources/BowPress/Resources/Assets.xcassets
      - Sources/BowPress/Subscriptions/Products.storekit
    dependencies:
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "7"
        INFOPLIST_FILE: SupportingFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/BowPress.entitlements
        STORE_KIT_CONFIGURATION_FILE_PATH: Sources/BowPress/Subscriptions/Products.storekit
        DEVELOPMENT_TEAM: DFT522PW2V
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          APS_ENVIRONMENT: development
          CODE_SIGN_STYLE: Automatic
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "BowPress AppStore"

  BowPressTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BowPressTests
    dependencies:
      - target: BowPress
      - package: swift-snapshot-testing
        product: SnapshotTesting
    info:
      path: SupportingFiles/Tests-Info.plist
      properties:
        CFBundleName: BowPressTests
        CFBundlePackageType: BNDL
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress.tests
        GENERATE_INFOPLIST_FILE: NO

  BowPressUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BowPressUITests
    # SKTestSession needs Products.storekit inside the test runner's own
    # bundle (separate process from the app under test). xcodegen dedupes
    # resources between targets when the same file path appears in both,
    # so attach it via a post-compile copy step instead.
    postCompileScripts:
      - name: Copy Products.storekit into UITests runner bundle
        script: |
          SRC="$SRCROOT/Sources/BowPress/Subscriptions/Products.storekit"
          DST="$TARGET_BUILD_DIR/$PRODUCT_NAME.xctest/Products.storekit"
          cp -f "$SRC" "$DST"
    dependencies:
      - target: BowPress
      # StoreKitTest is an simulator-only framework Apple ships for
      # automated purchase testing. UI test targets can link it directly
      # because the XCTest runtime is already their dep.
      - sdk: StoreKitTest.framework
    info:
      path: SupportingFiles/UITests-Info.plist
      properties:
        CFBundleName: BowPressUITests
        CFBundlePackageType: BNDL
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewnguyen.bowpress.uitests
        GENERATE_INFOPLIST_FILE: NO
        TEST_TARGET_NAME: BowPress
