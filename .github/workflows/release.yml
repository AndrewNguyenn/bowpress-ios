name: Release (TestFlight + App Review)

# Tag push matching v* → archive + upload to TestFlight + submit to App Review.
# This is the explicit "ship it" step. Use it when you've validated the build
# on TestFlight and want Apple to review the version.
#
# Example:
#   git tag v1.0.2 -m "Short description of the release"
#   git push --tags
#
# What happens:
#   1. MARKETING_VERSION gets set to the tag (v1.0.2 → 1.0.2) — no manual edit.
#   2. CURRENT_PROJECT_VERSION gets the next build number from ASC.
#   3. Archive + upload to TestFlight (same as testflight.yml).
#   4. scripts/ci/submit-to-review.py cancels any in-flight review submissions,
#      creates/updates the 1.0.2 appStoreVersion, links the build, copies
#      metadata + screenshots from the prior version, sets App Review
#      demo-account details, and submits.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.2). Skips the tag check.'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$V' must be in X.Y.Z form." >&2
            exit 1
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Releasing version: $V"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r scripts/asc/requirements.txt

      - name: Write ASC API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "ASC_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Compute next build number
        id: buildnum
        run: |
          N=$(python3 scripts/ci/next-build-number.py)
          echo "build=$N" >> $GITHUB_OUTPUT

      - name: Pin version + build in project.yml
        run: |
          sed -i '' "s/MARKETING_VERSION: \"[^\"]*\"/MARKETING_VERSION: \"${{ steps.version.outputs.version }}\"/" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: \"[0-9]*\"/CURRENT_PROJECT_VERSION: \"${{ steps.buildnum.outputs.build }}\"/" project.yml
          grep -E "MARKETING_VERSION|CURRENT_PROJECT_VERSION" project.yml

      - name: Generate xcodeproj
        run: xcodegen generate

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DIST_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="ephemeral-ci-$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          mv profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme BowPress \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/BowPress.xcarchive \
            -quiet \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/BowPress.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist scripts/asc/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app --type ios \
            --file build/export/BowPress.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Submit to App Review
        run: |
          python3 scripts/ci/submit-to-review.py \
            --version-string "${{ steps.version.outputs.version }}" \
            --build-version "${{ steps.buildnum.outputs.build }}" \
            --whats-new "${{ github.event.head_commit.message || format('Release {0}', steps.version.outputs.version) }}"

      - name: Summary
        run: |
          echo "### Released v${{ steps.version.outputs.version }} to App Review" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ steps.buildnum.outputs.build }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Review queue: SUBMITTED. Typical approval 24–48h." >> $GITHUB_STEP_SUMMARY
