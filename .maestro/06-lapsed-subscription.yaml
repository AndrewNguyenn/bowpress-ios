appId: com.andrewnguyen.bowpress
name: 06-lapsed-subscription
tags:
  - paywall
  - storekit
---
# Lapsed-entitlement transition. Orchestrator must have just called
# PATCH /__test__/entitlement { email: "e2e-free@bowpress.dev", isActive: false }
# so the backend reports the user as read-only. Flow asserts UpgradeBanner
# appears, then re-subscribes via the paywall and verifies writes unlock.

- launchApp:
    clearState: true
    arguments:
      - "-AutoSignInEmail"
      - "e2e-free@bowpress.dev"
      - "-AutoSignInPassword"
      - "bowpress-e2e-pw-1234"

- assertVisible: "Session"

- tapOn: "Equipment"

- extendedWaitUntil:
    visible:
      id: "upgrade_banner"
    timeout: 8000

- tapOn:
    id: "upgrade_banner"

- extendedWaitUntil:
    visible:
      id: "paywall_sheet"
    timeout: 5000

- tapOn:
    id: "paywall_monthly_button"

- tapOn:
    text: "Subscribe"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true

- extendedWaitUntil:
    notVisible:
      id: "paywall_sheet"
    timeout: 15000

- extendedWaitUntil:
    notVisible:
      id: "upgrade_banner"
    timeout: 8000
