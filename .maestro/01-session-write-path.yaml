appId: com.andrewnguyen.bowpress
name: 01-session-write-path
tags:
  - regression
  - writes
---
# Exercises the write pipeline end-to-end: create a bow, log a tuning
# config, start a session, plot three arrows, end it, assert the row.
# Orchestrator follows up with server-side curl assertions.

- launchApp:
    clearState: true
    arguments:
      AutoSignInEmail: "e2e-test@bowpress.dev"
      AutoSignInPassword: "bowpress-e2e-pw-1234"

# HydrationSplashView covers MainTabView for ~3s on launch and eats taps.
# Wait for it to fade before any navigation.
- extendedWaitUntil:
    notVisible: "Analyzing your data"
    timeout: 20000

# Create a new bow
- tapOn: "Equipment"
- extendedWaitUntil:
    visible: "Bows"
    timeout: 8000
- tapOn: "Add Bows"
- assertVisible: "Add Bow"
- tapOn: "Recurve"
- tapOn:
    id: "bow_name_field"
- inputText: "Maestro Recurve"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Maestro Recurve"
    timeout: 5000

# AddBowView creates a default BowConfiguration automatically (see
# AddBowView.swift saveBow). Sheet dismisses and navigation pushes
# BowDetailView. No separate "Log Tuning" step is needed for the happy
# path — the config already exists on the backend.

# Start a session against the new bow
- tapOn: "Session"
- extendedWaitUntil:
    visible: "Bow"
    timeout: 10000
# Pick the new bow and the seeded arrow config (bow list is long due to
# seeded fixtures; scrollUntilVisible handles off-screen elements).
- scrollUntilVisible:
    element: "Maestro Recurve"
    direction: DOWN
- tapOn: "Maestro Recurve"
- scrollUntilVisible:
    element: "Test Arrows"
    direction: DOWN
- tapOn: "Test Arrows"
- scrollUntilVisible:
    element: "Start Session"
    direction: DOWN
- tapOn: "Start Session"
- extendedWaitUntil:
    visible:
      id: "target_plot_canvas"
    timeout: 10000

# Plot one arrow near the center of the target face. The canvas rejects
# taps outside the visible rings, so center-ish coordinates are safest.
# One plot is enough — the post-flow server assertion is what actually
# proves POST /sessions/:id/plots landed.
- tapOn:
    id: "target_plot_canvas"
    point: "50%,50%"

# BowPress uses a two-step end UX: tap "Complete End N" to close out the
# current end, then "End Session" appears in the toolbar/nav. Completing
# the end ALSO persists the session (PUT /sessions/:id with arrow count),
# which is the regression guard we actually care about.
- extendedWaitUntil:
    visible: "Complete End 1"
    timeout: 8000
- tapOn: "Complete End 1"

# At this point the backend has received POST /bows, POST /sessions,
# POST /sessions/:id/plots, and the PUT for end-completion. The
# orchestrator's assert-server-state.sh will verify via curl.
